<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Care Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background-color: #f9f9f9;
      }
      .logo {
        width: 50px;
        height: 50px;
        margin-left: 2px;
      }
      .myimg {
        width: 50px;
        height: 50px;
        border: 2px solid black;
        border-radius: 25px;
      }
      .result-container {
        margin-top: 20px;
        text-align: center;
      }
      .toggle-button {
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <div class="logo">
          <img class="myimg" src="static/img.png" alt="">
        </div>
        <a class="navbar-brand" href="#">Health Center</a>
      </div>
    </nav>

    <!-- Main Form -->
    <h1 class="mt-4 my-4 text-center">Health Care Center</h1>
    <div class="container my-4 mt-4" style="background: black; color: white; border-radius: 15px; padding: 40px;">
      <form id="uploadForm">
        <div class="form-group">
          <label for="imageInput">Upload Image:</label>
          <input type="file" class="form-control" id="imageInput" accept="image/*" required>
        </div>
        <br>
        <div class="form-group">
          <label for="promptInput">Enter Symptoms / Prompt:</label>
          <input type="text" class="form-control" id="promptInput" placeholder="Type symptoms such as itching, aching, etc">
        </div>
        <br>
        <button type="submit" class="btn btn-danger btn-lg" style="width: 100%; padding: 14px;">Predict</button>
      </form>
    </div>

    <!-- Results Section -->
    <div class="container result-container" id="results" style="display:none;">
      <h1 class="text-center my-4 mt-4">Our AI System Results</h1>
      <button class="toggle-button btn btn-warning" data-bs-toggle="modal" data-bs-target="#diseaseModal">Disease</button>
      <button class="toggle-button btn btn-primary" data-bs-toggle="modal" data-bs-target="#descriptionModal">Description</button>
      <button class="toggle-button btn btn-info" data-bs-toggle="modal" data-bs-target="#precautionModal">Precaution</button>
      <button class="toggle-button btn btn-success" data-bs-toggle="modal" data-bs-target="#medicationsModal">Medications</button>
      <button class="toggle-button btn btn-secondary" data-bs-toggle="modal" data-bs-target="#workoutsModal">Workouts</button>
      <button class="toggle-button btn btn-dark" data-bs-toggle="modal" data-bs-target="#dietsModal">Diets</button>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="diseaseModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Disease</h5></div>
        <div class="modal-body"><p id="diseaseText"></p></div>
      </div></div>
    </div>

    <div class="modal fade" id="descriptionModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Description</h5></div>
        <div class="modal-body"><p id="descriptionText"></p></div>
      </div></div>
    </div>

    <div class="modal fade" id="precautionModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Precaution</h5></div>
        <div class="modal-body"><ul id="precautionList"></ul></div>
      </div></div>
    </div>

    <div class="modal fade" id="medicationsModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Medications</h5></div>
        <div class="modal-body"><ul id="medicationsList"></ul></div>
      </div></div>
    </div>

    <div class="modal fade" id="workoutsModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Workouts</h5></div>
        <div class="modal-body"><ul id="workoutsList"></ul></div>
      </div></div>
    </div>

    <div class="modal fade" id="dietsModal" tabindex="-1">
      <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header bg-dark text-white"><h5>Diets</h5></div>
        <div class="modal-body"><ul id="dietsList"></ul></div>
      </div></div>
    </div>

    <!-- JS -->
    <script>
      const form = document.getElementById("uploadForm");
      const resultsDiv = document.getElementById("results");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById("imageInput");
        const promptInput = document.getElementById("promptInput");

        if (!fileInput.files.length) {
          alert("Please select an image first.");
          return;
        }

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);   // must match FastAPI param
        formData.append("prompt", promptInput.value);

        try {
          const response = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            body: formData
          });
          if (!response.ok) throw new Error("Server error: " + response.statusText);
          const data = await response.json();

          // Fill modal content dynamically
          document.getElementById("diseaseText").textContent = data.predicted_disease || "N/A";
          document.getElementById("descriptionText").textContent = data.description || "N/A";

          const precautionList = document.getElementById("precautionList");
          precautionList.innerHTML = "";
          (data.precautions || []).forEach(p => {
            const li = document.createElement("li");
            li.textContent = p;
            precautionList.appendChild(li);
          });

          const medicationsList = document.getElementById("medicationsList");
          medicationsList.innerHTML = "";
          (data.medications || []).forEach(m => {
            const li = document.createElement("li");
            li.textContent = m;
            medicationsList.appendChild(li);
          });

          const workoutsList = document.getElementById("workoutsList");
          workoutsList.innerHTML = "";
          (data.workouts || []).forEach(w => {
            const li = document.createElement("li");
            li.textContent = w;
            workoutsList.appendChild(li);
          });

          const dietsList = document.getElementById("dietsList");
          dietsList.innerHTML = "";
          (data.diets || []).forEach(d => {
            const li = document.createElement("li");
            li.textContent = d;
            dietsList.appendChild(li);
          });

          resultsDiv.style.display = "block";
        } catch (err) {
          alert("Error: " + err.message);
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
